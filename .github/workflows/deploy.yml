name: Build and Push Custom Image to GHCR

on:
  # 支持在 GitHub 网页上手动点击按钮触发 (方便首次强制构建)
  workflow_dispatch:
  # 定时任务：每天凌晨 2 点自动检查一次源镜像是否更新
  schedule:
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  # github.repository 自动获取 "你的用户名/仓库名"
  IMAGE_NAME: ${{ github.repository }}
  # 【必填】将此处替换为你实际依赖的第三方源镜像
  BASE_IMAGE: headscale/headscale:latest

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    
    # 授权 GITHUB_TOKEN 读取仓库和写入 GHCR 镜像包的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 优先登录 GHCR
      # 这一步必须在检查步骤之前，以确保有权限读取你自己的 GHCR 目标镜像(尤其是私有镜像时)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 核心步骤：检查第三方源镜像是否更新
      - name: Check if base image was updated
        id: check
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: ${{ env.BASE_IMAGE }}
          # 你存放在 GHCR 的目标镜像
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. 准备构建环境 (只有当需要更新，或者人为手动触发时才执行)
      - name: Set up QEMU
        if: steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      # 4. 生成镜像标签和元数据
      - name: Extract metadata (tags, labels) for Docker
        if: steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      # 5. 构建并推送镜像
      - name: Build and push Docker image
        if: steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
